services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: knowledge-project-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: knowledge_project
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 123456
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge_user -d knowledge_project"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
